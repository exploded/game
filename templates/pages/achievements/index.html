{{template "base" .}}

{{define "content"}}
<div class="page-header">
    <h1>Achievements</h1>
    <a href="/dashboard" class="btn btn-sm">&larr; Dashboard</a>
</div>

<div class="achievements-grid">
    {{range .Extra.All}}
    {{$earnedAt := index $.Extra.Earned .Key}}
    <div class="achievement-card {{if $earnedAt}}achievement-earned{{else}}achievement-locked{{end}}">
        <div class="achievement-icon">{{.Icon}}</div>
        <div class="achievement-info">
            <h3>{{.Name}}</h3>
            <p>{{.Description}}</p>
            {{if $earnedAt}}<span class="text-muted" style="font-size:0.75rem">Earned {{$earnedAt}}</span>{{end}}
        </div>
    </div>
    {{end}}
</div>
{{end}}
