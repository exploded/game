{{template "base" .}}

{{define "content"}}
<div class="page-header">
    <h1>Chat</h1>
    <a href="/games/{{.Item.ID}}" class="btn btn-sm">&larr; Game</a>
</div>

<div class="chat-container">
    <form hx-post="/games/{{.Item.ID}}/chat"
          hx-swap="none"
          hx-disabled-elt="find button"
          class="chat-form"
          id="chat-form">
        <input type="text" name="message" placeholder="Type a message..." autocomplete="off"
               class="chat-input" maxlength="500" required id="chat-input">
        <button type="submit" class="btn btn-primary">Send</button>
    </form>

    <div id="messages-list" class="messages-list" style="min-height:200px">
        {{if .Items}}
        {{range .Items}}
        <div class="chat-message">
            <div class="chat-meta">
                <strong>{{.UserName}}</strong>
                <span class="text-muted">{{.CreatedAt}}</span>
            </div>
            <p>{{.Message}}</p>
        </div>
        {{end}}
        {{else}}
        <p class="text-muted" style="padding:1rem">No messages yet. Start the conversation!</p>
        {{end}}
    </div>
</div>

<script>
document.getElementById('chat-form').addEventListener('htmx:afterRequest', function() {
    document.getElementById('chat-input').value = '';
    document.getElementById('chat-input').focus();
});
</script>
{{end}}
